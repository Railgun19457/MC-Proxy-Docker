# MC-Proxy 配置示例（推荐）
#
# 设计原则：
# 1) 每个业务端口只写一条规则，避免拆成 v4/v6 两份配置。
# 2) listen_net 优先使用 tcp/udp，覆盖双栈客户端。
# 3) backend_addr 可写域名，程序会按协议自动拨号。

proxies:
  # Java（TCP）
  - name: "java"
    listen_net: "tcp"                # 推荐: tcp
    listen_addr: ":25565"
    backend_addr: "velocity:25565"
    rule: "proxy_protocol"           # passthrough | proxy_protocol
    proxy_version: 2                  # TCP: 1 或 2，默认 2
    connect_timeout: "3s"
    read_buffer_size: 32768
    write_buffer_size: 32768
    udp_session_timeout: "0s"        # TCP 下忽略

  # Bedrock（UDP）
  - name: "bedrock"
    listen_net: "udp"                # 推荐: udp
    listen_addr: ":19132"
    backend_addr: "velocity:19132"
    rule: "passthrough"
    connect_timeout: "3s"
    read_buffer_size: 32768
    write_buffer_size: 32768
    udp_session_timeout: "2m"        # UDP 会话回收时间

  # 语音（UDP）
  - name: "voice"
    listen_net: "udp"
    listen_addr: ":25565"
    backend_addr: "velocity:25565"
    rule: "passthrough"
    connect_timeout: "3s"
    read_buffer_size: 32768
    write_buffer_size: 32768
    udp_session_timeout: "2m"
