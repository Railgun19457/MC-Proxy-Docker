# MC-Proxy 配置文件示例（YAML）
#
# 关键规则：
# 1) proxies 至少需要 1 条。
# 2) 每个 name 必须唯一。
# 3) listen_addr / backend_addr 必须与 listen_net 地址族一致。
# 4) rule=proxy_protocol 时：
#    - TCP 支持 proxy_version=1 或 2（默认 2）
#    - UDP 仅支持 proxy_version=2

proxies:
  # 1) Java 版 TCP 直通（不附加 PROXY 头）
  - name: "java-tcp-passthrough"
    listen_net: "tcp4"             # 必填: tcp4 | tcp6 | udp4 | udp6
    listen_addr: "0.0.0.0:25565"   # 必填: 代理监听地址
    backend_addr: "127.0.0.1:25566" # 必填: 后端服务地址
    rule: "passthrough"            # 必填: passthrough | proxy_protocol
    proxy_version: 0                # 可选: rule=passthrough 时通常填 0
    connect_timeout: "3s"          # 可选: 默认 3s
    read_buffer_size: 32768         # 可选: 默认 32768 (32 KiB)
    write_buffer_size: 32768        # 可选: 默认 32768 (32 KiB)
    udp_session_timeout: "0s"       # TCP 场景忽略，保留仅用于示例完整性

  # 2) Java 版 TCP + PROXY protocol
  # 后端必须支持 PROXY protocol，且监听端口不能与其他条目冲突。
  - name: "java-tcp-proxyproto"
    listen_net: "tcp4"
    listen_addr: "0.0.0.0:25567"
    backend_addr: "127.0.0.1:25568"
    rule: "proxy_protocol"
    proxy_version: 2                # TCP 可填 1 或 2；不填时默认 2
    connect_timeout: "3s"
    read_buffer_size: 32768
    write_buffer_size: 32768
    udp_session_timeout: "0s"       # TCP 场景忽略

  # 3) Bedrock UDP 直通
  - name: "bedrock-udp-passthrough"
    listen_net: "udp4"
    listen_addr: "0.0.0.0:19132"
    backend_addr: "127.0.0.1:19133"
    rule: "passthrough"
    proxy_version: 0                # UDP + passthrough 可省略
    connect_timeout: "3s"
    read_buffer_size: 32768
    write_buffer_size: 32768
    udp_session_timeout: "2m"       # 仅 UDP 生效；默认 2m

  # 4) Bedrock UDP + PROXY protocol v2（可选）
  # UDP 仅支持 PROXY protocol v2。
  # 如果你只需要一个 Bedrock 入口，请只保留一个 19132 监听。
  - name: "bedrock-udp-proxyproto"
    listen_net: "udp4"
    listen_addr: "0.0.0.0:19134"
    backend_addr: "127.0.0.1:19135"
    rule: "proxy_protocol"
    proxy_version: 2
    connect_timeout: "3s"
    read_buffer_size: 32768
    write_buffer_size: 32768
    udp_session_timeout: "2m"
